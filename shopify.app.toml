# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "c0a4f57c6f2803211055e011288accb6"
application_url = "https://bulk-price-editor-lz64.vercel.app"
embedded = true

name = "Pryxo Bulk Price Editor"
handle = "pryxo-bulk-price-editor"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "https://bulk-price-editor-lz64.vercel.app/webhooks"
  topics = [ "app/scopes_update" ]

  [[webhooks.subscriptions]]
  uri = "https://bulk-price-editor-lz64.vercel.app/webhooks"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "https://bulk-price-editor-lz64.vercel.app/webhooks"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_inventory,write_inventory,read_themes,write_themes,write_orders,read_orders,read_customers,write_customers,write_markets,read_markets"

[auth]
redirect_urls = [
  "https://bulk-price-editor-lz64.vercel.app/auth/callback",
  "https://bulk-price-editor-lz64.vercel.app/shopify/callback",
  "https://bulk-price-editor-lz64.vercel.app/api/auth/callback"
]

[build]
automatically_update_urls_on_dev = true
